<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio Turístico Delicias</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts Dependencies and Recharts (Pinned to stable 2.12.7 to avoid UMD ForwardRef bug) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style>
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: #fdfbf7; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
          BarChart, Bar, ScatterChart, Scatter, 
          XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, 
          ResponsiveContainer, AreaChart, Area, ZAxis, Cell,
          ComposedChart, Line, Legend
        } = window.Recharts;

        // --- ICONOS SVG (Lucide) ---
        const Icon = ({ children, className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Lightbulb = (props) => <Icon {...props}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></Icon>;
        const Users = (props) => <Icon {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const DollarSign = (props) => <Icon {...props}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></Icon>;
        const BedDouble = (props) => <Icon {...props}><path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"/><path d="M4 10V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4"/><path d="M12 4v6"/><path d="M2 18h20"/></Icon>;
        const TrendingUp = (props) => <Icon {...props}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
        const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Target = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;
        const Filter = (props) => <Icon {...props}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></Icon>;
        const Calendar = (props) => <Icon {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;
        const BarChart2 = (props) => <Icon {...props}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></Icon>;
        const MapIcon = (props) => <Icon {...props}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></Icon>;
        const Award = (props) => <Icon {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></Icon>;
        const Briefcase = (props) => <Icon {...props}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></Icon>;
        const Activity = (props) => <Icon {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
        const Landmark = (props) => <Icon {...props}><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></Icon>;
        const Flag = (props) => <Icon {...props}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></Icon>;


        // --- COMPONENTES REUTILIZABLES ---
        const StrategicTooltip = ({ title, usefulFor, strategy }) => {
          const [show, setShow] = useState(false);

          return (
            <div 
              className="absolute top-3 right-3 z-50" 
              onMouseEnter={() => setShow(true)} 
              onMouseLeave={() => setShow(false)}
            >
              <div className="bg-amber-100 p-1.5 rounded-full cursor-help shadow-sm hover:bg-amber-200 transition-colors">
                <Lightbulb className="w-5 h-5 text-amber-600" />
              </div>
              
              {show && (
                <div className="absolute right-0 top-10 w-80 bg-white border border-amber-200 shadow-2xl rounded-xl p-5 text-sm text-slate-700 pointer-events-none transform transition-all duration-300 origin-top-right">
                  <div className="absolute -top-2 right-4 w-4 h-4 bg-white border-t border-l border-amber-200 transform rotate-45"></div>
                  <h4 className="font-bold text-amber-900 mb-3 text-base border-b border-amber-100 pb-2 flex items-center gap-2">
                    <Target className="w-4 h-4" />
                    {title}
                  </h4>
                  <div className="space-y-3">
                    <p className="leading-relaxed">
                      <strong className="text-slate-900 block mb-1">¿Para qué es útil?</strong> 
                      {usefulFor}
                    </p>
                    <p className="leading-relaxed">
                      <strong className="text-slate-900 block mb-1">Estrategia sugerida:</strong> 
                      <span className="text-emerald-700 font-medium">{strategy}</span>
                    </p>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const KpiCard = ({ title, value, subtitle, icon: IconComp, color, tooltipData }) => (
          <div className="relative bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-shadow h-full">
            {tooltipData && <StrategicTooltip {...tooltipData} />}
            <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-4 ${color}`}>
              <IconComp className="w-6 h-6" />
            </div>
            <h3 className="text-slate-500 text-sm font-semibold mb-1">{title}</h3>
            <div className="flex flex-col gap-1">
              <span className="text-2xl lg:text-3xl font-bold text-slate-800">{value}</span>
              {subtitle && <span className="text-xs text-slate-500 font-medium leading-tight mt-1">{subtitle}</span>}
            </div>
          </div>
        );

        // --- VISTA 1: MONITOREO DE EVENTOS ---
        const EventMonitoringView = ({ filteredData, selectedYear, EVENT_COLORS, metricConfig, primaryMetric, setPrimaryMetric }) => {
          const totalVisitantes = filteredData.reduce((acc, curr) => acc + curr.visitantes, 0);
          const promOcupacion = Math.round(filteredData.reduce((acc, curr) => acc + curr.ocupacion, 0) / (filteredData.length || 1));
          const totalIngresos = filteredData.reduce((acc, curr) => acc + curr.ingreso, 0);
          const promSatisfaccion = (filteredData.reduce((acc, curr) => acc + curr.satisfaccion, 0) / (filteredData.length || 1)).toFixed(1);

          return (
            <div className="fade-in">
              {/* Fila 1: KPIs */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <KpiCard 
                  title={`Total Visitantes (${selectedYear})`}
                  value={totalVisitantes.toLocaleString()}
                  icon={Users}
                  color="bg-amber-50 text-amber-600"
                  tooltipData={{
                    title: "Volumen de Visitantes",
                    usefulFor: "Mide el flujo de turistas impulsado por los eventos históricos y proyectados (2022-2026).",
                    strategy: "Cruzar la asistencia de la 'Expo Feria' y el 'Festival de la Fundación' para dimensionar el mercado."
                  }}
                />
                <KpiCard 
                  title="Ocupación Promedio"
                  value={`${promOcupacion}%`}
                  icon={BedDouble}
                  color="bg-purple-50 text-purple-600"
                  tooltipData={{
                    title: "Ocupación de Infraestructura",
                    usefulFor: "Muestra los picos donde la capacidad hotelera se satura.",
                    strategy: "Si se aproxima al 100%, detonar la construcción o adaptación de hospedaje local."
                  }}
                />
                <KpiCard 
                  title={`Derrama Económica (${selectedYear})`}
                  value={`$${(totalIngresos / 1000000).toFixed(2)}M`}
                  icon={DollarSign}
                  color="bg-emerald-50 text-emerald-600"
                  tooltipData={{
                    title: "Impacto Económico Directo",
                    usefulFor: "Cuantifica el retorno financiero por los eventos organizados.",
                    strategy: "Impulsar ventas cruzadas de productos regionales (nuez, vino, queso) durante los festivales."
                  }}
                />
                <KpiCard 
                  title="Índice de Satisfacción"
                  value={`${promSatisfaccion}/5`}
                  icon={TrendingUp}
                  color="bg-blue-50 text-blue-600"
                  tooltipData={{
                    title: "Calidad de la Experiencia",
                    usefulFor: "Un índice alto asegura que los turistas regresen los años posteriores.",
                    strategy: "Capacitar mediante los Registros Nacionales de Turismo (RNT) para mantener este estándar elevado."
                  }}
                />
              </div>

              {/* Fila 2: Gráficas Principales */}
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-8">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative lg:col-span-7">
                  <StrategicTooltip 
                    title="Evolución Histórica y Proyectada"
                    usefulFor="Permite observar las tendencias estacionales a través del tiempo."
                    strategy="Identifica patrones de meses 'valle' consistentes para inventar nuevos festivales."
                  />
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                      <BarChart2 className="w-5 h-5 text-amber-500" /> Evolución Temporal
                    </h3>
                    <div className="flex bg-slate-100 p-1 rounded-lg">
                      {Object.keys(metricConfig).map(key => (
                        <button
                          key={key}
                          onClick={() => setPrimaryMetric(key)}
                          className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${
                            primaryMetric === key ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'
                          }`}
                        >
                          {metricConfig[key].name}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="h-80">
                    <ResponsiveContainer width="100%" height="100%">
                      <AreaChart data={filteredData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                        <defs>
                          <linearGradient id="colorMetric" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="5%" stopColor={metricConfig[primaryMetric].color} stopOpacity={0.4}/>
                            <stop offset="95%" stopColor={metricConfig[primaryMetric].color} stopOpacity={0}/>
                          </linearGradient>
                        </defs>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                        <XAxis dataKey="mes_corto" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                        <YAxis axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} tickFormatter={metricConfig[primaryMetric].format} />
                        <RechartsTooltip 
                          formatter={(value) => [metricConfig[primaryMetric].format(value), metricConfig[primaryMetric].name]}
                          contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} 
                        />
                        <Area type="monotone" dataKey={primaryMetric} stroke={metricConfig[primaryMetric].color} strokeWidth={3} fillOpacity={1} fill="url(#colorMetric)" activeDot={{ r: 6, strokeWidth: 0, fill: metricConfig[primaryMetric].color }}/>
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative lg:col-span-5">
                  <StrategicTooltip 
                    title="Impacto por Tipología de Evento"
                    usefulFor="Demuestra la capacidad de arrastre que tiene cada evento sobre el número de visitantes."
                    strategy="Priorizar los presupuestos municipales hacia los eventos que generen las barras más largas."
                  />
                  <h3 className="text-lg font-bold text-slate-800 mb-6">Afluencia por Evento (Top)</h3>
                  <div className="h-80">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart 
                        data={filteredData.filter(d => d.evento_tipo !== 'Ninguno').sort((a,b) => b.visitantes - a.visitantes).slice(0, 8)} 
                        layout="vertical" 
                        margin={{ top: 0, right: 30, left: 20, bottom: 0 }}
                      >
                        <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#f1f5f9" />
                        <XAxis type="number" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                        <YAxis type="category" dataKey="evento_nombre" axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 10, fontWeight: 500}} width={110} />
                        <RechartsTooltip cursor={{fill: '#f8fafc'}} contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} formatter={(value, name, props) => [`${value.toLocaleString()} pax`, `Año: ${props.payload.year}`]} />
                        <Bar dataKey="visitantes" radius={[0, 4, 4, 0]}>
                          {filteredData.filter(d => d.evento_tipo !== 'Ninguno').sort((a,b) => b.visitantes - a.visitantes).slice(0, 8).map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={EVENT_COLORS[entry.evento_tipo]} />
                          ))}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
              
              {/* Fila 3: Correlaciones */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative mb-8">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                  <div>
                    <h3 className="text-lg font-bold text-slate-800">Perfil del Turista: Retención vs Monetización</h3>
                    <p className="text-sm text-slate-500">Días promedio de estancia vs. Gasto diario promedio clasificado por temática.</p>
                  </div>
                  <div className="flex flex-wrap gap-3 mt-3 md:mt-0">
                    {Object.entries(EVENT_COLORS).filter(([k]) => k !== 'Ninguno').map(([tipo, color]) => (
                      <div key={tipo} className="flex items-center gap-1.5 text-xs text-slate-600 font-medium">
                        <div className="w-3 h-3 rounded-full" style={{ backgroundColor: color }}></div>
                        {tipo}
                      </div>
                    ))}
                  </div>
                </div>
                <div className="h-96 w-full">
                  <ResponsiveContainer width="100%" height="100%">
                    <ScatterChart margin={{ top: 20, right: 30, bottom: 20, left: 20 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
                      <XAxis type="number" dataKey="dias_estancia" name="Estancia Promedio" unit=" días" tick={{fill: '#64748b'}} domain={[1, 4]} />
                      <YAxis type="number" dataKey="gasto_promedio" name="Gasto Promedio" unit=" MXN" tick={{fill: '#64748b'}} domain={[500, 3000]} />
                      <ZAxis type="number" dataKey="visitantes" range={[100, 1000]} name="Afluencia" />
                      <RechartsTooltip cursor={{ strokeDasharray: '3 3' }} contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)', padding: '12px' }} content={({ active, payload }) => {
                          if (active && payload && payload.length) {
                            const data = payload[0].payload;
                            return (
                              <div className="bg-white p-3 rounded-lg shadow-xl border border-slate-100">
                                <p className="font-bold text-slate-800 border-b pb-1 mb-2">{data.mes_corto} {data.year}</p>
                                {data.evento_nombre !== 'Ninguno' && <p className="text-sm font-semibold text-amber-600 mb-1">{data.evento_nombre}</p>}
                                <p className="text-sm text-slate-600">Estancia: <span className="font-semibold text-slate-800">{data.dias_estancia} días</span></p>
                                <p className="text-sm text-slate-600">Gasto Prom.: <span className="font-semibold text-emerald-600">${data.gasto_promedio} MXN</span></p>
                                <p className="text-sm text-slate-600">Categoría: {data.evento_tipo}</p>
                              </div>
                            );
                          }
                          return null;
                        }}/>
                      {Object.keys(EVENT_COLORS).map(tipo => (
                        <Scatter key={tipo} name={tipo} data={filteredData.filter(d => d.evento_tipo === tipo)} fill={EVENT_COLORS[tipo]} opacity={0.8} />
                      ))}
                    </ScatterChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>
          );
        };

        // --- VISTA 2: IMPACTO REGIONAL Y MACROECONÓMICO ---
        const RegionalImpactView = ({ macroData }) => {
          return (
            <div className="fade-in">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                <KpiCard 
                  title="Derrama Base (Histórico 2022)"
                  value="$444.9M"
                  subtitle="MXN generados, aportando 2.9% Estatal"
                  icon={Landmark}
                  color="bg-emerald-50 text-emerald-600"
                  tooltipData={{
                    title: "Métrica Base de Comparación",
                    usefulFor: "Punto de referencia para evaluar crecimiento interanual.",
                    strategy: "Demostrar incremento para aprobar mayores partidas."
                  }}
                />
                <KpiCard 
                  title="Derrama Perlas del Conchos"
                  value="≈$600M"
                  subtitle="Proyección 2025 (Solo enero: 50M)"
                  icon={TrendingUp}
                  color="bg-blue-50 text-blue-600"
                  tooltipData={{
                    title: "Proyección Regional 2025",
                    usefulFor: "Indica el peso de Delicias como motor principal en la región.",
                    strategy: "Unificar marcas bajo 'Perlas del Conchos'."
                  }}
                />
                <KpiCard 
                  title="Ocupación Hotelera"
                  value="1er Lugar"
                  subtitle="Estatal en 2024 (Récord histórico)"
                  icon={Award}
                  color="bg-amber-50 text-amber-600"
                  tooltipData={{
                    title: "Dominancia Estatal",
                    usefulFor: "Confirma a Delicias como principal receptor porcentual.",
                    strategy: "Atraer cadenas hoteleras con este dato."
                  }}
                />
                <KpiCard 
                  title="Afluencia Turística Noche"
                  value="213.3k"
                  subtitle="Registrados solo en el 2do Trimestre 2024"
                  icon={BedDouble}
                  color="bg-purple-50 text-purple-600"
                  tooltipData={{
                    title: "Volumen de Pernoctas",
                    usefulFor: "Demuestra densidad turística en pocos meses.",
                    strategy: "Estimular 'Late Check-out' y cenas."
                  }}
                />
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div className="bg-slate-800 text-white p-6 rounded-2xl relative overflow-hidden shadow-lg border border-slate-700">
                  <StrategicTooltip 
                    title="Política Pública"
                    usefulFor="El marco legal es el que permite que los fondos fluyan."
                    strategy="Lobby con diputados locales."
                  />
                  <div className="relative z-10">
                    <h3 className="text-slate-300 font-semibold mb-2 flex items-center gap-2">
                      <Landmark className="w-5 h-5 text-amber-400" /> Reforma a la Ley de Turismo 2026
                    </h3>
                    <p className="text-xl font-bold leading-tight mb-3">Reversión del Impuesto de Hospedaje (ISN) a la región.</p>
                    <p className="text-slate-400 text-sm">
                      Iniciativa para reinvertir en infraestructura local y <strong>Rutas del Vino, Queso y Nuez</strong>.
                    </p>
                  </div>
                  <div className="absolute right-0 top-0 opacity-10 transform translate-x-1/4 -translate-y-1/4">
                    <Target className="w-48 h-48" />
                  </div>
                </div>

                <div className="bg-white p-6 rounded-2xl relative shadow-sm border border-slate-200">
                  <StrategicTooltip 
                    title="Posicionamiento 2019"
                    usefulFor="Sustenta que Delicias es destino, no solo paso."
                    strategy="Rescatar 'Módulo de Información Turística'."
                  />
                  <h3 className="text-slate-500 font-semibold mb-2 flex items-center gap-2">
                    <Flag className="w-5 h-5 text-emerald-600" /> Visión Regional (Plan Vigente)
                  </h3>
                  <p className="text-lg text-slate-800 font-bold leading-tight mb-3">"Región Delicias, Zona Turística por Excelencia"</p>
                  <p className="text-slate-600 text-sm">Posicionamiento hacia la frontera. Énfasis en <strong>turismo de negocios y placer</strong>.</p>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative">
                  <h3 className="text-lg font-bold text-slate-800 mb-2">Evolución de Turistas-Noche</h3>
                  <p className="text-sm text-slate-500 mb-6">Comparativa Anual 2022 vs. 2do Trimestre 2024</p>
                  <div className="h-80">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={macroData.turistasNoche} margin={{ top: 20, right: 20, bottom: 20, left: 20 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                        <XAxis dataKey="periodo" tick={{fill: '#64748b', fontSize: 12}} axisLine={false} tickLine={false} />
                        <YAxis tick={{fill: '#64748b'}} axisLine={false} tickLine={false} tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
                        <RechartsTooltip 
                          contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} 
                          formatter={(value) => [value.toLocaleString(), "Turistas Noche"]}
                        />
                        <Legend />
                        <Bar dataKey="valor" name="Huéspedes" radius={[6, 6, 0, 0]} maxBarSize={80}>
                          {macroData.turistasNoche.map((entry, index) => (
